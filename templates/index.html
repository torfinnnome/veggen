<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggen Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root { --pico-spacing: 0.5rem; }
        .status-blocked { color: #d81b60; font-weight: bold; font-size: 0.85em; }
        .status-online { color: #2e7d32; font-weight: bold; font-size: 0.85em; }
        .loading { display: none; }
        [aria-busy="true"] .loading { display: inline-block; }
        
        table { margin-bottom: 0; }
        table td, table th { 
            padding: 0.4rem 0.5rem; 
            vertical-align: middle; 
        }
        
        .group-header {
            background-color: var(--pico-accordion-close-summary-color);
            border-top: 2px solid var(--pico-primary);
            border-bottom: 1px solid var(--pico-border-color);
        }
        .group-header td {
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        /* Add space before group header except the first one */
        #devices-tbody tr.group-header:not(:first-child) td {
            padding-top: 2.5rem;
        }
        .kid-name {
            font-size: 1.25em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--pico-primary);
            margin: 0;
        }
        .device-row td:first-child {
            padding-left: 1.5rem; /* Indent devices */
        }
        .device-name { font-weight: 600; line-height: 1.2; }
        .device-meta { 
            font-size: 0.75em; 
            color: var(--pico-muted-color); 
            display: block;
            margin-top: -2px;
        }
        
        .batch-control {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            font-size: 0.85em;
            font-weight: 600;
        }
        input[role="switch"] { margin-bottom: 0; }
    </style>
</head>
<body>
    <nav class="container">
        <ul><li><strong>Veggen</strong></li></ul>
        <ul><li><a href="/logout" class="secondary" style="font-size: 0.8em;">Logout</a></li></ul>
    </nav>
    <main class="container">
        <section id="device-list" aria-busy="true">
            <div class="loading">Loading...</div>
            <table id="main-table">
                <thead>
                    <tr>
                        <th>Device</th>
                        <th style="width: 100px;">Status</th>
                        <th style="width: 60px;">Action</th>
                    </tr>
                </thead>
                <tbody id="devices-tbody">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        async function fetchDevices() {
            const section = document.getElementById('device-list');
            section.setAttribute('aria-busy', 'true');
            
            try {
                const response = await fetch('/api/devices');
                const devices = await response.json();
                const tbody = document.getElementById('devices-tbody');
                tbody.innerHTML = '';

                if (devices.length === 0) {
                    const emptyRow = document.createElement('tr');
                    const emptyCell = document.createElement('td');
                    emptyCell.setAttribute('colspan', '3');
                    emptyCell.textContent = 'No devices found.';
                    emptyRow.appendChild(emptyCell);
                    tbody.appendChild(emptyRow);
                    return;
                }

                const groups = devices.reduce((acc, dev) => {
                    if (!acc[dev.kid]) acc[dev.kid] = [];
                    acc[dev.kid].push(dev);
                    return acc;
                }, {});

                for (const kid in groups) {
                    const kidDevices = groups[kid];
                    const allBlocked = kidDevices.every(d => d.blocked);

                    // Group Header Row (DOM-safe, no innerHTML with user data)
                    const headerRow = document.createElement('tr');
                    headerRow.className = 'group-header';

                    const td1 = document.createElement('td');
                    const h3 = document.createElement('h3');
                    h3.className = 'kid-name';
                    h3.textContent = kid;
                    td1.appendChild(h3);
                    headerRow.appendChild(td1);

                    const td2 = document.createElement('td');
                    td2.setAttribute('colspan', '2');

                    const batchDiv = document.createElement('div');
                    batchDiv.className = 'batch-control';

                    const label = document.createElement('span');
                    label.textContent = 'BLOCK ALL';
                    batchDiv.appendChild(label);

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.setAttribute('role', 'switch');
                    if (allBlocked) checkbox.checked = true;
                    checkbox.addEventListener('change', function () {
                        toggleMultiple(kid, this.checked);
                    });
                    batchDiv.appendChild(checkbox);

                    td2.appendChild(batchDiv);
                    headerRow.appendChild(td2);
                    tbody.appendChild(headerRow);

                    // Device Rows (DOM-safe)
                    kidDevices.forEach(dev => {
                        const tr = document.createElement('tr');
                        tr.className = 'device-row';

                        const nameTd = document.createElement('td');
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'device-name';
                        nameDiv.textContent = dev.device_name;
                        nameTd.appendChild(nameDiv);

                        const metaDiv = document.createElement('div');
                        metaDiv.className = 'device-meta';
                        metaDiv.textContent = dev.ip + ' | ' + dev.mac;
                        nameTd.appendChild(metaDiv);
                        tr.appendChild(nameTd);

                        const statusTd = document.createElement('td');
                        const statusSpan = document.createElement('span');
                        statusSpan.className = dev.blocked ? 'status-blocked' : 'status-online';
                        statusSpan.textContent = dev.blocked ? 'BLOCKED' : 'ONLINE';
                        statusTd.appendChild(statusSpan);
                        tr.appendChild(statusTd);

                        const actionTd = document.createElement('td');
                        const devCheckbox = document.createElement('input');
                        devCheckbox.type = 'checkbox';
                        devCheckbox.setAttribute('role', 'switch');
                        if (dev.blocked) devCheckbox.checked = true;
                        const macVal = dev.mac;
                        const blockedVal = dev.blocked;
                        devCheckbox.addEventListener('change', function () {
                            toggleDevice(macVal, blockedVal);
                        });
                        actionTd.appendChild(devCheckbox);
                        tr.appendChild(actionTd);
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error('Error:', error);
            } finally {
                section.setAttribute('aria-busy', 'false');
            }
        }

        async function toggleDevice(mac, currentlyBlocked) {
            const action = currentlyBlocked ? 'unblock' : 'block';
            try {
                const response = await fetch('/api/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mac, action })
                });
                if (response.ok) await fetchDevices();
                else alert('Failed to update status.');
            } catch (e) { console.error(e); }
        }

        async function toggleMultiple(kid, shouldBlock) {
            const action = shouldBlock ? 'block' : 'unblock';
            try {
                const res = await fetch('/api/devices');
                const devices = await res.json();
                const macs = devices.filter(d => d.kid === kid).map(d => d.mac);
                if (macs.length === 0) return;

                const response = await fetch('/api/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ macs, action })
                });
                if (response.ok) await fetchDevices();
                else alert('Failed to update group.');
            } catch (e) { console.error(e); }
        }

        fetchDevices();
    </script>
</body>
</html>
